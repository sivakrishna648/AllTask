name: PR Review - Security & Quality

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

      - name: Run npm audit on backend
        working-directory: ./backend
        run: npm audit --audit-level=high || true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data..."
          if grep -r "password\|secret\|api_key\|token" --include="*.js" --include="*.json" . | grep -v ".env.example" | grep -v "node_modules"; then
            echo "Potential sensitive data found!"
            exit 1
          fi

      - name: Check Dockerfiles for best practices
        run: |
          echo "Checking Dockerfiles..."
          # Check for root user usage
          if grep -r "USER root" frontend/Dockerfile backend/Dockerfile 2>/dev/null; then
            echo "Warning: Running as root user detected"
          fi
          # Check for exposed secrets
          if grep -r "ENV.*PASSWORD\|ENV.*SECRET" frontend/Dockerfile backend/Dockerfile 2>/dev/null; then
            echo "Warning: Potential hardcoded secrets in Dockerfile"
          fi

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for outdated dependencies
        run: |
          npm install -g npm-check-updates
          cd frontend && ncu --errorLevel=6 || true
          cd ../backend && ncu --errorLevel=6 || true

  comment-results:
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality, dependency-check]
    if: always()
    
    steps:
      - name: Post summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const issues = [];
            
            if (${{ needs.security-scan.result }} === 'failure') {
              issues.push('⚠️ Security vulnerabilities detected');
            }
            if (${{ needs.code-quality.result }} === 'failure') {
              issues.push('⚠️ Code quality issues found');
            }
            if (${{ needs.dependency-check.result }} === 'failure') {
              issues.push('⚠️ Outdated dependencies detected');
            }
            
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## PR Review Results\n\n' + issues.join('\n\n')
              });
            }